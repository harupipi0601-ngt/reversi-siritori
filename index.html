<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>しりとりボード完全版</title>

<!-- kuromoji -->
<script src="https://unpkg.com/kuromoji@0.1.2/build/kuromoji.js"></script>

<style>
body { font-family: sans-serif; text-align:center; background:#f5f5f5; }

h1 { margin-top:10px; }

#board {
  display:grid;
  grid-template-columns:repeat(6,60px);
  gap:6px;
  justify-content:center;
  margin:20px;
}

.cell {
  width:60px;height:60px;
  border:1px solid #333;
  font-size:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:white;
  cursor:pointer;
  transition:0.2s;
}

.cell:hover { background:#eee; }
.selected { background:#90caf9 !important; }

#panel { margin-top:10px; }

input {
  padding:8px;
  font-size:16px;
  width:200px;
}

button {
  padding:8px 16px;
  font-size:16px;
  cursor:pointer;
}

#turn { font-weight:bold; }
#timer { color:red; }

</style>
</head>
<body>

<h1>しりとりボード</h1>

<div id="board"></div>

<div id="panel">
  <input id="wordInput" placeholder="単語入力">
  <button onclick="submitWord()">決定</button>
</div>

<p id="turn"></p>
<p id="timer"></p>

<script>
const SIZE=6;
let board=[],selected=[];
let currentPlayer=1;
let lastChar="";
let lastPos=null;
let time=60,timer;
let tokenizer;
let usedWords=[];

// ====== kuromoji初期化 ======
function initTokenizer(){
  return new Promise((resolve,reject)=>{
    kuromoji.builder({
      dicPath:"https://unpkg.com/kuromoji@0.1.2/dict/"
    }).build((err,t)=>{
      if(err) reject(err);
      tokenizer=t;
      resolve();
    });
  });
}

// ====== 初期化 ======
function init(){
  const b=document.getElementById("board");
  b.innerHTML="";
  board=[];

  for(let y=0;y<SIZE;y++){
    board[y]=[];
    for(let x=0;x<SIZE;x++){
      board[y][x]="";
      const c=document.createElement("div");
      c.className="cell";
      c.onclick=()=>clickCell(x,y);
      b.appendChild(c);
    }
  }

  // 中央
  ["あ","い","う","え"].forEach((ch,i)=>{
    let x=2+(i%2), y=2+Math.floor(i/2);
    setCell(x,y,ch);
  });

  updateTurn();
  resetTimer();
}

// ====== ユーティリティ ======
function getCell(x,y){
  return document.getElementsByClassName("cell")[y*SIZE+x];
}
function setCell(x,y,c){
  board[y][x]=c;
  getCell(x,y).textContent=c;
}

function normalizeKana(c){
  const map={"ャ":"ヤ","ュ":"ユ","ョ":"ヨ","ッ":"ツ","ー":""};
  return map[c]||c;
}

// ====== クリック ======
function clickCell(x,y){

  if(selected.length===0){
    if(lastPos){
      if(Math.abs(lastPos.x-x)>1||Math.abs(lastPos.y-y)>1){
        alert("前の終点の隣から！");
        return;
      }
    }
  }else{
    let p=selected[selected.length-1];
    if(Math.abs(p.x-x)>1||Math.abs(p.y-y)>1){
      alert("隣接のみ！");
      return;
    }
  }

  if(selected.some(p=>p.x===x&&p.y===y)) return;

  selected.push({x,y});
  getCell(x,y).classList.add("selected");
}

// ====== 辞書チェック ======
function checkWord(word){

  const tokens=tokenizer.tokenize(word);

  // 名詞限定（固有名詞もOK）
  if(!tokens.every(t=>t.pos==="名詞")){
    alert("名詞のみ！");
    return null;
  }

  const reading=tokens.map(t=>t.reading||"").join("");
  if(!reading){
    alert("読み取得失敗");
    return null;
  }

  let last=normalizeKana(reading.slice(-1));

  return {reading,last};
}

// ====== 提出 ======
function submitWord(){

  const input=document.getElementById("wordInput").value.trim();
  if(input.length<2){ alert("2文字以上"); return; }

  const res=checkWord(input);
  if(!res) return;

  // 重複禁止
  if(usedWords.includes(input)){
    alert("その単語は使用済み");
    return;
  }

  // しりとり
  if(lastChar && normalizeKana(res.reading[0])!==lastChar){
    alert("しりとりになってない");
    return;
  }

  // ん負け
  if(res.last==="ン"){
    alert("『ん』で負け！");
    return;
  }

  // 盤面一致
  const pathStr=selected.map(p=>board[p.y][p.x]||"").join("");
  for(let i=0;i<pathStr.length;i++){
    if(pathStr[i] && pathStr[i]!==input[i]){
      alert("盤面と違う！");
      return;
    }
  }

  // 新規マス
  if(selected.every(p=>board[p.y][p.x]!=="")){
    alert("新規マス必要！");
    return;
  }

  // 反映
  selected.forEach((p,i)=>{
    if(!board[p.y][p.x]){
      setCell(p.x,p.y,input[i]);
    }
  });

  usedWords.push(input);
  lastChar=res.last;
  lastPos=selected[selected.length-1];

  nextTurn();
}

// ====== ターン ======
function nextTurn(){
  selected.forEach(p=>getCell(p.x,p.y).classList.remove("selected"));
  selected=[];
  currentPlayer=currentPlayer===1?2:1;
  updateTurn();
  resetTimer();
}

function updateTurn(){
  document.getElementById("turn").textContent=
    "プレイヤー"+currentPlayer+"のターン";
}

// ====== タイマー ======
function startTimer(){
  timer=setInterval(()=>{
    time--;
    document.getElementById("timer").textContent="残り："+time;
    if(time<=0){
      alert("時間切れ！プレイヤー"+currentPlayer+"の負け");
      clearInterval(timer);
    }
  },1000);
}

function resetTimer(){
  clearInterval(timer);
  time=60;
  startTimer();
}

// ====== 起動 ======
async function start(){
  document.getElementById("turn").textContent="辞書ロード中...";
  await initTokenizer();
  init();
}

start();
</script>

</body>
</html>
